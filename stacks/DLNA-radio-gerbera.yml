  # 2. Python playlist generator script
  generate-playlists:
    content: |
      import re
      import pathlib
      import sys
      from collections import defaultdict

      group_re = re.compile(r'group-title="([^"]*)"')

      def parse_extinf(line):
          group_match = group_re.search(line)
          group = group_match.group(1) if group_match else "Unknown"
          name = line.rsplit(",",1)[-1].strip()
          return group, name

      def safe_string(s):
          s = re.sub(r'[^\w\s-]', '', s)
          s = s.strip().replace(' ', '_')
          # remove leading junk like "-" "_"
          s = s.lstrip("-_")
          return s

      def generate(input_file, output_dir):
          groups = defaultdict(set)
          with open(input_file) as f:
              lines = iter(f)
              for line in lines:
                  if line.startswith("#EXTINF"):
                      group, name = parse_extinf(line)
                      url = next(lines).strip()
                      # Skip garbage entries
                      bad_prefixes_raw = ("group-title", "tvg")
                      if name.lower().startswith(bad_prefixes_raw):
                        continue
                      groups[group].add((name, url))
          base = pathlib.Path(output_dir)
          base.mkdir(exist_ok=True)

          for group, stations in groups.items():
              safe_group = safe_string(group)
              group_dir = base / safe_group
              group_dir.mkdir(exist_ok=True)
              for name, url in sorted(stations):
                  safe_name = safe_string(name)
                  # Skip bad filenames
                  if safe_name.lower().startswith("grouptitle"):
                      continue
                  target = group_dir / f"{safe_name}.m3u"

                  with open(target,"w") as f:
                      f.write("#EXTM3U\n")
                      f.write(f"#EXTINF:-1,{name}\n")
                      f.write(url+"\n")

      if __name__ == "__main__":
          generate(sys.argv[1],sys.argv[2])

