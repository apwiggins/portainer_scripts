---
#  Serve a large list of radio stations through DLNA

services:
  # -------------------------
  # Python playlist generator
  # -------------------------
  playlist-generator:
    image: python:3.12-slim
    container_name: playlist-generator
    volumes:
      - radio-playlists:/app/playlists
    configs:
      - source: radio-stations
        target: /app/radio_stations.m3u
      - source: generate-playlists
        target: /app/generate_playlists.py
    command: >
      sh -c "while true; do
               python3 /app/generate_playlists.py /app/radio_stations.m3u /app/playlists
               sleep 3600
             done"
    restart: unless-stopped

  # -------------------------
  # Gerbera DLNA server
  # -------------------------
  gerbera:
    image: gerbera/gerbera:3.1.1
    container_name: gerbera
    network_mode: host
    volumes:
      - radio-playlists:/mnt/content/radio
      - gerbera-data:/var/lib/gerbera

    configs:
      - source: gerbera-conf
        target: /var/lib/gerbera/config.xml
    restart: unless-stopped

volumes:
  radio-playlists:
  gerbera-data:

