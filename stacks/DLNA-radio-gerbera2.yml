  # 2. Python playlist generator script (Flattened / No Groups)
  generate-playlists:
    content: |
      #!/usr/bin/env python3
      import sys, re
      from pathlib import Path

      def generate():
          m3u_input = Path(sys.argv[1])
          out_dir = Path(sys.argv[2])
          out_dir.mkdir(parents=True, exist_ok=True)

          stations = []
          current_inf = None
          active_marker_group = "Uncategorized"

          with open(m3u_input, "r", encoding="utf-8") as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith("#EXTM3U"):
                      continue

                  # 1. Look for Human-Readable Section Markers
                  # Matches: # --- GROUP: My Genre ---
                  if line.startswith("# --- GROUP:"):
                      marker_match = re.search(r'GROUP:(.*?)---', line)
                      if marker_match:
                          active_marker_group = marker_match.group(1).strip()
                      continue

                  # 2. Skip other non-EXTINF comments
                  if line.startswith("#") and not line.startswith("#EXTINF"):
                      continue
                  if line.startswith("#EXTINF"):
                      current_inf = line
                  elif current_inf and line.startswith("http"):
                      # 3. Determine Group: Priority 1: group-title="" | Priority 2: Marker
                      group_match = re.search(r'group-title="([^"]+)"', current_inf)
                      if group_match:
                          genre = group_match.group(1).split(';')[0].strip()
                      else:
                          genre = active_marker_group
                      # 4. Clean Station Name
                      parts = current_inf.split(",", 1)
                      name_raw = parts[1] if len(parts) > 1 else parts[0].replace("#EXTINF:", "")
                      name_clean = name_raw.split(":")[0].strip()

                      safe_name = re.sub(r'[^\w\s-]', '', name_clean).strip().replace(' ', '_')
                      safe_genre = re.sub(r'[^\w\s-]', '', genre).strip().replace(' ', '_')

                      stations.append({
                          "genre_dir": safe_genre,
                          "filename": f"{safe_name}.m3u",
                          "content": f"#EXTM3U\n#EXTINF:-1,{name_clean}\n{line}\n"
                      })
                      current_inf = None

          # Write out the folder structure
          for station in stations:
              target_dir = out_dir / station["genre_dir"]
              target_dir.mkdir(exist_ok=True)

              target_path = target_dir / station["filename"]

              # Collision handling for duplicate names
              #counter = 1
              #original_stem = target_path.stem
              #while target_path.exists():
              #    target_path = target_dir / f"{original_stem}_{counter}.m3u"
              #    counter += 1
              with open(target_path, "w", encoding="utf-8") as f:
                  f.write(station["content"])

      if __name__ == "__main__":
          generate()


