---
## a simplified M3U (non-standard) to provide some human-readable groups.

# add a custom header line followed by a simplified EXTINF line and the URL link
# below an embedded python script decodes the groups and creates a separate M3U
# for each group.  For DLNA, this creates separate folders which makes DLNA
# browsing simpler for very large lists

#      # --- GROUP: Linn Radio ---
#      #EXTINF:-1, Linn Classical
#      http://89.16.185.174:8004/stream
#      #EXTINF:-1, Linn Jazz
#      http://89.16.185.174:8000/stream
#      #EXTINF:-1, Linn Radio
#      http://89.16.185.174:8003/stream

#  Serve a large list of radio stations through DLNA

services:
  # -------------------------
  # Python playlist generator
  # -------------------------
  playlist-generator:
    image: python:3.12-slim
    container_name: playlist-generator
    volumes:
      - radio-playlists:/app/playlists
    configs:
      - source: radio-stations
        target: /app/radio_stations.m3u
      - source: generate-playlists
        target: /app/generate_playlists.py
    command: >
      sh -c "while true; do
               python3 /app/generate_playlists.py /app/radio_stations.m3u /app/playlists
               sleep 3600
             done"
    restart: unless-stopped

  # -------------------------
  # Gerbera DLNA server
  # -------------------------
  gerbera:
    image: gerbera/gerbera:3.0.0
    container_name: gerbera
    network_mode: host
    volumes:
      - radio-playlists:/mnt/content
      - gerbera-data:/var/lib/gerbera

    configs:
      - source: gerbera-conf
        target: /var/lib/gerbera/config.xml
    restart: unless-stopped

volumes:
  radio-playlists:
  gerbera-data:

# -------------------------
# Embedded configs
# -------------------------
